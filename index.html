<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Magic AI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Montserrat:wght@300&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-magic min-h-screen text-white">

    <div class="max-w-2xl mx-auto px-6 py-12 relative z-10">
        <header class="text-center mb-16">
            <h1 class="text-3xl font-light font-[Montserrat] tracking-wide">Ramadan Magic ✨</h1>
        </header>

        <main>
            <div class="text-center mb-12">
                <h2 class="text-5xl md:text-6xl font-bold leading-tight">
                    Ubah Curhatan <br> Ramadanmu <br> 
                    <span class="text-outline font-light">Jadi Magic</span>
                </h2>
            </div>

            <div class="glass rounded-[24px] p-8 mb-10">
                <textarea id="userInput" placeholder="Lemes nunggu buka puasa..." 
                    class="w-full bg-transparent border-none text-2xl font-light placeholder-white/20 outline-none resize-none h-32"></textarea>
                
                <div class="flex justify-end mt-4">
                    <button onclick="generateMagic()" id="btnMagic"
                        class="btn-magic px-8 py-3 rounded-full font-medium hover:scale-105 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        Create Magic ✨
                    </button>
                </div>
            </div>

            <div id="resultArea" class="hidden space-y-6 transition-all duration-500">
                <div class="bg-white/5 border-l-4 border-[#F59E0B] p-6 rounded-xl glass">
                    <p id="captionText" class="text-xl italic font-light"></p>
                </div>

                <div class="relative rounded-[24px] overflow-hidden border border-white/20 bg-black/40 shadow-2xl">
                    <img id="imageResult" class="w-full block" src="" alt="AI Result">
                </div>

                <div class="flex flex-col gap-4">
                    <button onclick="downloadMedia()" 
                        class="btn-download px-8 py-4 rounded-2xl font-medium flex items-center justify-center gap-2 transition-all">
                        📥 Simpan Gambar
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
